<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TempMail - Anonymous Temporary Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #141416;
            --surface-hover: #1c1c1f;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #27272a;
            --text-main: #f4f4f5;
            --text-dim: #a1a1aa;
            --border: #27272a;
            --success: #10b981;
            --error: #ef4444;
            --radius-main: 12px;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        header {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        /* Email Display Box */
        .email-box {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-main);
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .email-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, carver(--primary), #a855f7);
            opacity: 0.3;
        }

        .email-display {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius-main) - 4px);
            padding: 1rem 1.5rem;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .email-actions {
            display: flex;
            gap: 1rem;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            flex: 2;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background-color: var(--secondary);
            color: var(--text-main);
            flex: 1;
        }

        .btn-secondary:hover {
            background-color: var(--surface-hover);
            transform: translateY(-2px);
        }

        /* Inbox Section */
        .inbox {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-main);
            overflow: hidden;
            width: 100%;
        }

        .inbox-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .inbox-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .status {
            font-size: 0.875rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .email-list {
            list-style: none;
            max-height: 500px;
            overflow-y: auto;
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-dim);
        }

        .empty-state h3 {
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .email-item {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .email-item:last-child {
            border-bottom: none;
        }

        .email-item:hover {
            background-color: var(--surface-hover);
        }

        .email-item .item-meta {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
        }

        .email-item .from {
            color: var(--primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .email-item .time {
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .email-item .subject {
            font-weight: 500;
            font-size: 1rem;
        }

        .email-item .preview {
            color: var(--text-dim);
            font-size: 0.875rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Detail Modal */
        #email-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 100;
            padding: 2rem 1rem;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header-info h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .modal-header-info div {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            flex: 1;
            line-height: 1.6;
            color: var(--text-main);
            background: #fff; /* Paper feel for email content */
            color: #1a1a1a;
        }

        #close-modal {
            background: none;
            color: var(--text-dim);
            padding: 0.5rem;
            font-size: 1.5rem;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transform: translateY(200%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <header>
        <h1>TempMail</h1>
        <p>Your one-time anonymous email for social media and surveys.</p>
    </header>

    <div class="container">
        <div class="email-box">
            <div id="email-field" class="email-display">
                <span id="current-email">generating...</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
            <div class="email-actions">
                <button id="copy-btn" class="btn-primary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy Address
                </button>
                <button id="refresh-btn" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    Refresh Inbox
                </button>
                <button id="new-btn" class="btn-secondary">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    New Email
                </button>
            </div>
        </div>

        <div class="inbox">
            <div class="inbox-header">
                <h2>Inbox</h2>
                <div class="status">
                    <div class="pulse"></div>
                    Waiting for emails...
                </div>
            </div>
            <ul id="email-list" class="email-list">
                <div class="empty-state">
                    <h3>No emails yet</h3>
                    <p>Emails will automatically appear here once sent to your address.</p>
                </div>
            </ul>
        </div>
    </div>

    <!-- Email Modal -->
    <div id="email-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-header-info">
                    <h2 id="modal-subject">Subject</h2>
                    <div id="modal-from">From: ...</div>
                    <div id="modal-time">Time: ...</div>
                </div>
                <button id="close-modal">&times;</button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Address copied to clipboard!</div>

    <script>
        const DOMAIN = 'firtaet.xyz';
        let currentEmail = '';
        let inbox = [];

        // Elements
        const emailEl = document.getElementById('current-email');
        const listEl = document.getElementById('email-list');
        const modal = document.getElementById('email-modal');
        const toast = document.getElementById('toast');

        // Initialization
        const savedEmail = localStorage.getItem('last_temp_email');
        if (savedEmail) {
            currentEmail = savedEmail;
        } else {
            generateRandomEmail();
        }
        updateUI();
        pollEmails();

        function generateRandomEmail() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let res = '';
            for (let i = 0; i < 8; i++) {
                res += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentEmail = `${res}@${DOMAIN}`;
            localStorage.setItem('last_temp_email', currentEmail);
            updateUI();
            inbox = [];
            renderInbox();
        }

        function updateUI() {
            emailEl.textContent = currentEmail;
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function fetchEmails() {
            try {
                const res = await fetch(`/api/emails/${currentEmail}`);
                const data = await res.json();
                
                // If we have new emails, update
                if (JSON.stringify(data) !== JSON.stringify(inbox)) {
                    inbox = data;
                    renderInbox();
                }
            } catch (err) {
                console.error('Polling error:', err);
            }
        }

        function renderInbox() {
            if (inbox.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <h3>No emails yet</h3>
                        <p>Emails will automatically appear here once sent to your address.</p>
                    </div>
                `;
                return;
            }

            listEl.innerHTML = inbox.map(msg => `
                <li class="email-item" onclick="openEmail('${msg.id}')">
                    <div class="item-meta">
                        <span class="from">${msg.from}</span>
                        <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
                    </div>
                    <div class="subject">${msg.subject}</div>
                    <div class="preview">${msg.bodyPlain.substring(0, 80)}...</div>
                </li>
            `).join('');
        }

        function openEmail(id) {
            const msg = inbox.find(m => m.id === id);
            if (!msg) return;

            document.getElementById('modal-subject').textContent = msg.subject;
            document.getElementById('modal-from').textContent = `From: ${msg.from}`;
            document.getElementById('modal-time').textContent = `Date: ${new Date(msg.timestamp).toLocaleString()}`;
            
            const bodyEl = document.getElementById('modal-body');
            if (msg.bodyHtml) {
                bodyEl.innerHTML = msg.bodyHtml;
            } else {
                bodyEl.innerHTML = `<pre style="white-space: pre-wrap; font-family: inherit;">${msg.bodyPlain}</pre>`;
            }

            modal.style.display = 'flex';
        }

        function pollEmails() {
            fetchEmails();
            setInterval(fetchEmails, 5000);
        }

        // Button Listeners
        document.getElementById('copy-btn').onclick = () => {
            navigator.clipboard.writeText(currentEmail);
            showToast('Address copied to clipboard!');
        };

        document.getElementById('new-btn').onclick = () => {
            const custom = prompt('Enter custom name (leave empty for random):');
            if (custom === null) return;
            if (custom.trim() === '') {
                generateRandomEmail();
            } else {
                currentEmail = `${custom.trim().toLowerCase()}@${DOMAIN}`;
                localStorage.setItem('last_temp_email', currentEmail);
                updateUI();
                inbox = [];
                renderInbox();
            }
        };

        document.getElementById('refresh-btn').onclick = () => {
            fetchEmails();
            showToast('Checking for new emails...');
        };

        document.getElementById('close-modal').onclick = () => {
            modal.style.display = 'none';
        };

        window.onclick = (e) => {
            if (e.target === modal) modal.style.display = 'none';
        }
    </script>
</body>
</html>
